<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 span { font-size: 1.8rem; }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      color: #1a202c;
    }

    input[type="text"]:focus {
      border-color: #667eea;
    }

    button.add-btn {
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    button.add-btn:hover { background: #5a67d8; }
    button.add-btn:active { transform: scale(0.97); }

    .stats {
      font-size: 0.82rem;
      color: #718096;
      margin-bottom: 20px;
      min-height: 18px;
    }

    .filter-row {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filter-btn {
      padding: 6px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      background: transparent;
      font-size: 0.85rem;
      cursor: pointer;
      color: #718096;
      font-weight: 500;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: #667eea;
      border-color: #667eea;
      color: #fff;
    }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: #f7fafc;
      border-radius: 10px;
      border: 2px solid transparent;
      transition: border-color 0.2s, opacity 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    li.checked {
      opacity: 0.55;
      border-color: #c6f6d5;
      background: #f0fff4;
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #48bb78;
      cursor: pointer;
      flex-shrink: 0;
    }

    li .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-word;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    li .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      color: #cbd5e0;
      padding: 2px 4px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    li .del-btn:hover {
      color: #fc8181;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: none;
      border: 2px solid #fed7d7;
      color: #fc8181;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      background: #fff5f5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span>🛒</span> 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템을 입력하세요..." maxlength="60">
      <button class="add-btn" onclick="addItem()">추가</button>
    </div>

    <div class="stats" id="stats"></div>

    <div class="filter-row">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">전체</button>
      <button class="filter-btn" data-filter="active" onclick="setFilter('active', this)">미완료</button>
      <button class="filter-btn" data-filter="done" onclick="setFilter('done', this)">완료</button>
    </div>

    <ul id="list"></ul>
    <div class="empty" id="empty" style="display:none">아이템이 없습니다.</div>

    <button class="clear-btn" onclick="clearDone()" id="clearBtn" style="display:none">완료 항목 모두 삭제</button>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shopping') || '[]');
    let filter = 'all';

    const input   = document.getElementById('itemInput');
    const listEl  = document.getElementById('list');
    const emptyEl = document.getElementById('empty');
    const statsEl = document.getElementById('stats');
    const clearBtn = document.getElementById('clearBtn');

    input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

    function addItem() {
      const text = input.value.trim();
      if (!text) return;
      items.unshift({ id: Date.now(), text, checked: false });
      input.value = '';
      save();
      render();
    }

    function toggleItem(id) {
      const item = items.find(i => i.id === id);
      if (item) item.checked = !item.checked;
      save();
      render();
    }

    function deleteItem(id) {
      items = items.filter(i => i.id !== id);
      save();
      render();
    }

    function clearDone() {
      items = items.filter(i => !i.checked);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function save() {
      localStorage.setItem('shopping', JSON.stringify(items));
    }

    function render() {
      const total   = items.length;
      const done    = items.filter(i => i.checked).length;
      const active  = total - done;

      statsEl.textContent = total ? `총 ${total}개 · 완료 ${done}개 · 미완료 ${active}개` : '';
      clearBtn.style.display = done > 0 ? 'block' : 'none';

      const visible = items.filter(i =>
        filter === 'all'    ? true :
        filter === 'active' ? !i.checked :
                               i.checked
      );

      listEl.innerHTML = '';
      emptyEl.style.display = visible.length ? 'none' : 'block';

      visible.forEach(item => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.checked;
        cb.onchange = () => toggleItem(item.id);

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;

        const del = document.createElement('button');
        del.className = 'del-btn';
        del.innerHTML = '✕';
        del.title = '삭제';
        del.onclick = () => deleteItem(item.id);

        li.append(cb, span, del);
        listEl.appendChild(li);
      });
    }

    render();
  </script>
</body>
</html>
